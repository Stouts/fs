---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Check test directory exists
      ansible.builtin.stat:
        path: /tmp/fs-test-dir
      register: test_dir

    - name: Assert directory was created
      ansible.builtin.assert:
        that:
          - test_dir.stat.exists
          - test_dir.stat.isdir

    - name: Check test file exists
      ansible.builtin.stat:
        path: /tmp/fs-test-file.txt
      register: test_file

    - name: Assert file was created with correct mode
      ansible.builtin.assert:
        that:
          - test_file.stat.exists
          - test_file.stat.isreg

    - name: Check removed file does not exist
      ansible.builtin.stat:
        path: /tmp/fs-to-remove-file.txt
      register: removed_file

    - name: Assert removed file was deleted
      ansible.builtin.assert:
        that:
          - not removed_file.stat.exists

    - name: Check removed dir does not exist
      ansible.builtin.stat:
        path: /tmp/fs-to-remove-dir
      register: removed_dir

    - name: Assert removed directory was deleted
      ansible.builtin.assert:
        that:
          - not removed_dir.stat.exists
